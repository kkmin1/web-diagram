<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분기별 매출 차트 (빠른 로딩)</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #102033;
      --muted: #5f6b7a;
      --bar: #2f80ed;
      --bar-border: #1f5fb3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at top left, #e8f0ff 0%, var(--bg) 45%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(16, 32, 51, 0.08);
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 8px;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .chart-box {
      position: relative;
      height: 420px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>2026년 분기별 매출 현황</h1>
    <p>PyScript 없이 즉시 렌더링되는 버전입니다.</p>
    <div class="chart-box">
      <canvas id="salesChart" aria-label="분기별 매출 막대 차트" role="img"></canvas>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    const labels = ["1분기", "2분기", "3분기", "4분기"];
    const values = [150, 230, 180, 420];

    const ctx = document.getElementById("salesChart");

    new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "매출 (억원)",
          data: values,
          backgroundColor: "rgba(47, 128, 237, 0.82)",
          borderColor: "#1f5fb3",
          borderWidth: 1.2,
          borderRadius: 8,
          maxBarThickness: 72
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          duration: 450,
          easing: "easeOutQuart"
        },
        plugins: {
          legend: {
            labels: {
              font: { family: "Noto Sans KR", size: 13 }
            }
          },
          title: {
            display: false
          },
          tooltip: {
            titleFont: { family: "Noto Sans KR" },
            bodyFont: { family: "Noto Sans KR" }
          }
        },
        scales: {
          x: {
            ticks: {
              font: { family: "Noto Sans KR", size: 13 }
            },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: {
              font: { family: "Noto Sans KR", size: 12 }
            },
            title: {
              display: true,
              text: "매출 (억원)",
              font: { family: "Noto Sans KR", size: 13, weight: "600" }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
